<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>People 3D Visualization</title>

  <!-- Three.js + CSS3DRenderer (matched versions from same CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
  <!-- TWEEN -->
  <script src="https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@18.6.4/src/Tween.umd.js"></script>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --red:    #c0392b;
      --orange: #e67e22;
      --green:  #27ae60;
      --bg:     #0a0a0a;
      --panel:  rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ========== LOGIN PAGE ========== */
    #login-page {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 40% 50%, #0d1b2a 0%, #050505 70%);
      z-index: 1000;
    }
    .login-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 52px 48px;
      text-align: center;
      width: 380px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }
    .login-card h2 {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .login-card p {
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      margin-bottom: 36px;
      line-height: 1.6;
    }
    .google-btn {
      display: inline-flex; align-items: center; gap: 12px;
      background: #4285F4;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.1px;
    }
    .google-btn:hover { background: #3367D6; transform: translateY(-1px); }
    .google-btn svg { width:20px; height:20px; flex-shrink:0; }

    /* ========== MAIN APP ========== */
    #app { display:none; width:100%; height:100%; }

    /* Header */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      height: 56px;
      display: flex; align-items: center;
      padding: 0 20px;
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      gap: 16px;
    }
    #header h1 { font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.9); flex: 1; }

    /* View buttons */
    .view-buttons { display: flex; gap: 6px; }
    .view-btn {
      background: transparent;
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .view-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
    .view-btn.active { color: #fff; background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }

    /* User info */
    #user-info { display:flex; align-items:center; gap:8px; font-size:13px; color:rgba(255,255,255,0.5); }
    #user-avatar { width:28px; height:28px; border-radius:50%; object-fit:cover; }
    #sign-out-btn {
      background: transparent; color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.1);
      border-radius:5px; padding:4px 10px; font-size:11px; cursor:pointer; transition: all 0.2s;
    }
    #sign-out-btn:hover { color:#fff; border-color: rgba(255,255,255,0.3); }

    /* Legend */
    #legend {
      position: fixed; bottom: 20px; left: 20px;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      z-index: 100;
      font-size: 11px;
    }
    #legend .legend-title { color: rgba(255,255,255,0.4); margin-bottom:8px; font-size:10px; text-transform:uppercase; letter-spacing:1px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; color: rgba(255,255,255,0.65); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

    /* Loading indicator */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 500; gap: 16px;
    }
    .spinner { width:36px; height:36px; border:3px solid rgba(255,255,255,0.1); border-top-color:#fff; border-radius:50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: rgba(255,255,255,0.4); font-size: 13px; }

    /* 3D canvas */
    #scene-container {
      position: fixed;
      top: 56px; left: 0; right: 0; bottom: 0;
    }

    /* ========== ELEMENT TILES ========== */
    .element {
      width: 100px;
      height: 120px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 6px;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: opacity 0.3s;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .element:hover { border-color: rgba(255,255,255,0.5); }

    .element.red    { background: linear-gradient(145deg, #7b1010, #3d0808); }
    .element.orange { background: linear-gradient(145deg, #7a3a00, #3d1e00); }
    .element.green  { background: linear-gradient(145deg, #0a4a1a, #052610); }

    .el-header { display:flex; justify-content:space-between; width:100%; margin-bottom:4px; }
    .el-idx { font-size:9px; color:rgba(255,255,255,0.4); font-weight:600; }
    .el-country { font-size:9px; color:rgba(255,255,255,0.6); font-weight:700; letter-spacing:0.5px; }

    .el-photo {
      width: 58px; height: 58px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.3);
      flex-shrink: 0;
    }

    .el-name {
      font-size: 8.5px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      margin-top: 5px;
      line-height: 1.2;
      max-height: 22px;
      overflow: hidden;
      width: 100%;
      white-space: nowrap;
      text-overflow: ellipsis;
      padding: 0 2px;
    }

    .el-interest {
      font-size: 7.5px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      margin-top: 2px;
    }

    .el-worth {
      font-size: 7px;
      color: rgba(255,255,255,0.4);
      margin-top: 1px;
    }
  </style>
</head>

</div>

<!-- ============ LOADING ============ -->
<div id="loading" style="display:none;">
  <div class="spinner"></div>
  <p>Building 3D visualization...</p>
</div>

<!-- ============ MAIN APP ============ -->
<div id="app">
  <div id="header">
    <h1>People 3D Visualization</h1>
    <div class="view-buttons">
      <button class="view-btn active" onclick="transform('TABLE')" id="btn-TABLE">TABLE</button>
      <button class="view-btn" onclick="transform('SPHERE')" id="btn-SPHERE">SPHERE</button>
      <button class="view-btn" onclick="transform('HELIX')" id="btn-HELIX">HELIX</button>
      <button class="view-btn" onclick="transform('GRID')" id="btn-GRID">GRID</button>
    </div>
    <div id="user-info">
      <img id="user-avatar" src="" alt="" style="display:none"/>
      <span id="user-name"></span>
      <button id="sign-out-btn" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <div id="legend">
    <div class="legend-title">Net Worth</div>

    <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div> &gt; $200K</div>
  </div>

  <div id="scene-container"></div>
</div>

/* ============================================================
   HELPERS
   ============================================================ */
function parseNetWorth(str) {
  return parseFloat(str.replace(/[$,]/g, '')) || 0;
}
function getColorClass(str) {
  const v = parseNetWorth(str);
  if (v < 100000) return 'red';
  if (v <= 200000) return 'orange';
  return 'green';
}

/* ============================================================
   GOOGLE AUTH
   ============================================================ */
function triggerGoogleLogin() {
  // Uses Google Identity Services popup flow
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleCredentialResponse
  });
  google.accounts.id.prompt((notification) => {
    if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
      // Fallback: open one-tap
      google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'profile email',
        callback: (resp) => {
          if (resp.access_token) loginWithToken(resp.access_token);
        }
      }).requestAccessToken();
    }
  });
}

function handleCredentialResponse(response) {
  // Decode the JWT credential
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  onLoginSuccess(payload.name, payload.picture);
}

async function loginWithToken(token) {
  const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { Authorization: 'Bearer ' + token }
  });
  const info = await res.json();
  onLoginSuccess(info.name, info.picture);
}

function onLoginSuccess(name, picture) {
  // Hide login, show app FIRST so container has real pixel dimensions
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('user-name').textContent = name;
  if (picture) {
    const av = document.getElementById('user-avatar');
    av.src = picture; av.style.display = 'block';
  }
  // Wait 2 animation frames so browser paints and computes layout
  requestAnimationFrame(() => requestAnimationFrame(() => initScene()));
}

function signOut() {
  google.accounts.id.disableAutoSelect();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
}

// DEV BYPASS — remove in production
window.devLogin = function() {
  onLoginSuccess('Demo User', '');
};

/* ============================================================
   SCENE SETUP
   ============================================================ */
let camera, scene, renderer;
let objects = [], targets = { TABLE:[], SPHERE:[], HELIX:[], GRID:[] };
let currentView = 'TABLE';
const TILE_W = 110, TILE_H = 130, GAP = 8;

function initScene() {
  try {
    // Safety check — make sure libraries loaded
    if (typeof THREE === 'undefined') throw new Error('THREE.js not loaded');
    if (typeof THREE.CSS3DRenderer === 'undefined') throw new Error('CSS3DRenderer not loaded');
    if (typeof TWEEN === 'undefined' && typeof window.TWEEN === 'undefined') throw new Error('TWEEN not loaded');

    const container = document.getElementById('scene-container');
    // Force layout recalc — container must be visible to get real dimensions
    let W = container.clientWidth || window.innerWidth;
    let H = container.clientHeight || (window.innerHeight - 56);
    console.log('Container size:', W, H);

    // Camera
    camera = new THREE.PerspectiveCamera(40, W / H, 1, 10000);
    camera.position.set(0, 0, 3000);

    // Scene
    scene = new THREE.Scene();

    // CSS3D Renderer
    renderer = new THREE.CSS3DRenderer();
    renderer.setSize(W, H);
    container.appendChild(renderer.domElement);

    // Build tiles
    RAW_DATA.forEach((d, i) => {
      const div = document.createElement('div');
      div.className = 'element ' + getColorClass(d.netWorth);

      div.innerHTML = `
        <div class="el-header">
          <span class="el-idx">${i + 1}</span>
          <span class="el-country">${d.country}</span>
        </div>
        <img class="el-photo" src="${d.photo}" alt="${d.name}" loading="lazy"
             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 58 58%22%3E%3Crect width=%2258%22 height=%2258%22 rx=%2229%22 fill=%22%23333%22/%3E%3Ctext x=%2229%22 y=%2234%22 text-anchor=%22middle%22 fill=%22%23888%22 font-size=%2218%22%3E?%3C/text%3E%3C/svg%3E'"/>
        <div class="el-name">${d.name}</div>
        <div class="el-interest">${d.interest}</div>
        <div class="el-worth">${d.netWorth}</div>
      `;

      const obj = new THREE.CSS3DObject(div);
      obj.position.set(Math.random() * 4000 - 2000, Math.random() * 4000 - 2000, Math.random() * 4000 - 2000);
      scene.add(obj);
      objects.push(obj);
    });

    computeTargets();
    setupControls(container);

    // Hide loading (app is already visible from onLoginSuccess)
    document.getElementById('loading').style.display = 'none';

    transform('TABLE');
    animate();

    window.addEventListener('resize', onResize);

  } catch(err) {
    console.error('initScene error:', err);
    // Show error on loading screen instead of spinning forever
    document.querySelector('#loading p').textContent = 'Error: ' + err.message + ' — Check console (F12)';
  }
}

/* ============================================================
   COMPUTE TARGET POSITIONS
   ============================================================ */
function computeTargets() {
  const n = RAW_DATA.length; // 200

  /* TABLE  20 cols × 10 rows */
  {
    const cols = 20, rows = 10;
    const sx = TILE_W + GAP, sy = TILE_H + GAP;
    for (let i = 0; i < n; i++) {
      const col = i % cols, row = Math.floor(i / cols);
      const obj = new THREE.Object3D();
      obj.position.set(
        col * sx - (cols - 1) * sx / 2,
        -row * sy + (rows - 1) * sy / 2,
        0
      );
      targets.TABLE.push(obj);
    }
  }

  /* SPHERE */
  {
    const phi = Math.PI * (3 - Math.sqrt(5)); // golden angle
    for (let i = 0; i < n; i++) {
      const y = 1 - (i / (n - 1)) * 2;
      const r = Math.sqrt(1 - y * y);
      const theta = phi * i;
      const obj = new THREE.Object3D();
      const R = 900;
      obj.position.set(R * r * Math.cos(theta), R * y, R * r * Math.sin(theta));
      obj.lookAt(new THREE.Vector3(0, 0, 0));
      // Rotate 180 so face points outward
      obj.rotation.y += Math.PI;
      targets.SPHERE.push(obj);
    }
  }

  /* HELIX — double helix */
  {
    const R = 700, pitch = 100;
    for (let i = 0; i < n; i++) {
      const strand = i % 2; // 0 = helix A, 1 = helix B
      const idx = Math.floor(i / 2);
      const total = Math.ceil(n / 2);
      const t = (idx / total) * Math.PI * 6;
      const offset = strand * Math.PI; // half-turn offset for second strand
      const angle = t + offset;
      const y = (idx - total / 2) * pitch;
      const obj = new THREE.Object3D();
      obj.position.set(R * Math.cos(angle), y, R * Math.sin(angle));
      obj.rotation.y = -angle;
      targets.HELIX.push(obj);
    }
  }

  /* GRID  10 (x) × 4 (y) × 5 (z) = 200 */
  {
    const nx = 10, ny = 4, nz = 5;
    const sx = TILE_W + GAP + 10, sy = TILE_H + GAP + 10, sz = 200;
    let i = 0;
    for (let iz = 0; iz < nz; iz++)
    for (let iy = 0; iy < ny; iy++)
    for (let ix = 0; ix < nx; ix++) {
      const obj = new THREE.Object3D();
      obj.position.set(
        ix * sx - (nx - 1) * sx / 2,
        -iy * sy + (ny - 1) * sy / 2,
        -iz * sz + (nz - 1) * sz / 2
      );
      targets.GRID.push(obj);
      i++;
    }
  }
}

/* ============================================================
   TRANSFORM
   ============================================================ */
function transform(view) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + view).classList.add('active');

  const tgts = targets[view];
  const TW = window.TWEEN;
  TW.removeAll();

  for (let i = 0; i < objects.length; i++) {
    const obj = objects[i];
    const tgt = tgts[i];

    new TW.Tween(obj.position)
      .to({ x: tgt.position.x, y: tgt.position.y, z: tgt.position.z }, 1200)
      .easing(TW.Easing.Exponential.InOut)
      .delay(i * 2)
      .start();

    new TW.Tween(obj.rotation)
      .to({ x: tgt.rotation.x, y: tgt.rotation.y, z: tgt.rotation.z }, 1200)
      .easing(TW.Easing.Exponential.InOut)
      .delay(i * 2)
      .start();
  }

  // Adjust camera for view
  const camTarget = {
    TABLE:  { z: 2800, y: 0 },
    SPHERE: { z: 2200, y: 0 },
    HELIX:  { z: 2200, y: 0 },
    GRID:   { z: 3200, y: 0 }
  }[view];
  new TW.Tween(camera.position)
    .to({ z: camTarget.z, y: camTarget.y }, 1400)
    .easing(TW.Easing.Exponential.InOut)
    .start();
}

/* ============================================================
   ORBIT / DRAG CONTROLS
   ============================================================ */
function setupControls(container) {
  let isDragging = false, prevX = 0, prevY = 0;
  let rotX = 0, rotY = 0;
  let pivotGroup = new THREE.Group();
  scene.add(pivotGroup);
  // Move all objects into the pivot group
  objects.forEach(o => {
    scene.remove(o);
    pivotGroup.add(o);
  });

  container.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    rotY += (e.clientX - prevX) * 0.005;
    rotX += (e.clientY - prevY) * 0.005;
    prevX = e.clientX; prevY = e.clientY;
    pivotGroup.rotation.y = rotY;
    pivotGroup.rotation.x = rotX;
  });
  window.addEventListener('mouseup', () => isDragging = false);

  // Touch support
  container.addEventListener('touchstart', e => { isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; }, { passive: true });
  window.addEventListener('touchmove', e => {
    if (!isDragging) return;
    rotY += (e.touches[0].clientX - prevX) * 0.005;
    rotX += (e.touches[0].clientY - prevY) * 0.005;
    prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
    pivotGroup.rotation.y = rotY;
    pivotGroup.rotation.x = rotX;
  }, { passive: true });
  window.addEventListener('touchend', () => isDragging = false);

  // Wheel zoom
  container.addEventListener('wheel', e => {
    camera.position.z = Math.max(500, Math.min(6000, camera.position.z + e.deltaY * 1.5));
  }, { passive: true });
}

/* ============================================================
   ANIMATE
   ============================================================ */
function animate() {
  requestAnimationFrame(animate);
  const TW = window.TWEEN || TWEEN;
  TW.update();
  renderer.render(scene, camera);
}

function onResize() {
  const container = document.getElementById('scene-container');
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
}
</script>
